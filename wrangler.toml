name       = "olchaai-edge"
main       = "cloudflare-worker.js"
account_id = ""     # Set via: wrangler config / CLOUDFLARE_ACCOUNT_ID env var

compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
name    = "olchaai-edge-prod"
workers_dev = false

[[env.production.routes]]
pattern = "olchaai.com/*"
zone_name = "olchaai.com"

[[env.production.routes]]
pattern = "www.olchaai.com/*"
zone_name = "olchaai.com"

[env.staging]
name = "olchaai-edge-staging"
workers_dev = true
