apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus
  namespace: olcha
  labels:
    app: nexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus
  template:
    metadata:
      labels:
        app: nexus
    spec:
      containers:
        - name: nexus
          image: olcha/nexus:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: nexus
  namespace: olcha
spec:
  selector:
    app: nexus
  ports:
    - port: 3000
      targetPort: 3000
