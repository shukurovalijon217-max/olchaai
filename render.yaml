## OlchaAI — Render.com Blueprint
## Docs: https://render.com/docs/blueprint-spec
##
## Deploy steps:
## 1. Push this repo to GitHub
## 2. Go to render.com → New → Blueprint → connect your GitHub repo
## 3. Render will detect this file and create all services automatically
## 4. After first deploy, set the secret env vars listed below in each service's
##    Environment tab (Render does NOT read these from render.yaml for security)
##
## Required secrets to set manually in Render dashboard:
##   API Server & AI Core:
##     SESSION_SECRET        — random 64-char string  (e.g. openssl rand -hex 32)
##     OPENAI_API_KEY        — your OpenAI key
##     STRIPE_SECRET_KEY     — your Stripe secret key
##     RESEND_API_KEY        — your Resend email key
##   Nexus (set at build time — triggers a redeploy after first API deploy):
##     VITE_API_BASE_URL     — https://olchaai-api.onrender.com
##
## ALLOWED_ORIGINS on the API:
##     Add ALLOWED_ORIGINS=https://olchaai-nexus.onrender.com
##     so the API accepts cross-origin requests from the frontend.

databases:
  - name: olchaai-db
    databaseName: olchaai
    user: olchaai
    plan: free

services:
  # ── 1. Express API Server ────────────────────────────────────────────────
  - type: web
    name: olchaai-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.26.1 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: olchaai-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  # ── 2. AI Core Service ───────────────────────────────────────────────────
  - type: web
    name: olchaai-ai-core
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.26.1 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      pnpm --filter @workspace/ai-core run build
    startCommand: node --enable-source-maps artifacts/ai-core/dist/index.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: olchaai-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

  # ── 3. Go Real-Time Service ──────────────────────────────────────────────
  - type: web
    name: olchaai-go
    runtime: go
    plan: free
    region: oregon
    rootDir: artifacts/olcha-go
    buildCommand: go build -o bin/olcha-go ./cmd/server/
    startCommand: ./bin/olcha-go
    healthCheckPath: /go/health
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: olchaai-db
          property: connectionString

  # ── 4. Nexus — React Frontend ─────────────────────────────────────────────
  - type: web
    name: olchaai-nexus
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.26.1 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      BASE_PATH=/ pnpm --filter @workspace/nexus run build
    startCommand: npx serve -s artifacts/nexus/dist/public -l 10000
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_API_BASE_URL
        sync: false
