<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.2" baseProfile="tiny-ps" xmlns="http://www.w3.org/2000/svg"
     x="0" y="0" viewBox="0 0 100 100" width="512" height="512">
  <title>GILOS</title>
  <defs>
    <linearGradient id="oring" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#3b0764"/>
      <stop offset="24%" stop-color="#9333ea"/>
      <stop offset="50%" stop-color="#e9d5ff"/>
      <stop offset="76%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <mask id="ringmask">
      <circle cx="50" cy="50" r="45" fill="white"/>
      <circle cx="50" cy="50" r="26" fill="black"/>
    </mask>
  </defs>

  <!-- Solid dark background (required for BIMI) -->
  <rect x="0" y="0" width="100" height="100" fill="#0a0014"/>

  <!-- Outer glow circle -->
  <circle cx="50" cy="50" r="48" fill="#1a0033" opacity="0.8"/>

  <!-- Purple O-ring -->
  <g mask="url(#ringmask)">
    <circle cx="50" cy="50" r="45" fill="url(#oring)"/>
  </g>

  <!-- Gold edge highlight -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#c084fc" stroke-width="0.8" opacity="0.6"/>
  <circle cx="50" cy="50" r="26" fill="none" stroke="#a78bfa" stroke-width="0.6" opacity="0.5"/>

  <!-- G letter in center (neon red) -->
  <text x="50" y="58" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="28" font-weight="900" fill="#ff1744" letter-spacing="1">G</text>
</svg>
