openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: NEXUS Super Social Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: users
  - name: posts
  - name: reels
  - name: stories
  - name: messages
  - name: groups
  - name: notifications
  - name: ai
  - name: admin
  - name: storage
  - name: live
  - name: search
  - name: marketplace
  - name: gifts
  - name: creator

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── USERS ────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List / search users
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user profile
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/follow:
    post:
      operationId: followUser
      tags: [users]
      summary: Follow a user
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowResult"

  /users/{id}/followers:
    get:
      operationId: getUserFollowers
      tags: [users]
      summary: Get followers of a user
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/stats/summary:
    get:
      operationId: getUserStatsSummary
      tags: [users]
      summary: Platform user stats (total, new today, active)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStatsSummary"

  # ── POSTS ────────────────────────────────────────────────────────────────
  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: Feed posts
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [photo, video, text, all]
            default: all
        - in: query
          name: userId
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get single post
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /posts/{id}/like:
    post:
      operationId: likePost
      tags: [posts]
      summary: Like / unlike a post
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResult"

  /posts/{id}/comments:
    get:
      operationId: listPostComments
      tags: [posts]
      summary: List comments on a post
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createPostComment
      tags: [posts]
      summary: Comment on a post
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /posts/trending:
    get:
      operationId: getTrendingPosts
      tags: [posts]
      summary: Trending posts right now
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  # ── REELS ────────────────────────────────────────────────────────────────
  /reels:
    get:
      operationId: listReels
      tags: [reels]
      summary: Get reels feed
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
        - in: query
          name: userId
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reel"
    post:
      operationId: createReel
      tags: [reels]
      summary: Upload a reel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReelInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reel"

  /reels/{id}/like:
    post:
      operationId: likeReel
      tags: [reels]
      summary: Like a reel
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResult"

  # ── STORIES ──────────────────────────────────────────────────────────────
  /stories:
    get:
      operationId: listStories
      tags: [stories]
      summary: Get active stories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Story"
    post:
      operationId: createStory
      tags: [stories]
      summary: Post a story
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"

  /stories/{id}/view:
    post:
      operationId: viewStory
      tags: [stories]
      summary: Mark story as viewed
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViewResult"

  # ── MESSAGES ─────────────────────────────────────────────────────────────
  /conversations:
    get:
      operationId: listConversations
      tags: [messages]
      summary: List user conversations
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [messages]
      summary: Start a conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}/messages:
    get:
      operationId: getConversationMessages
      tags: [messages]
      summary: Get messages in a conversation
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /conversations/{id}/messages/{msgId}:
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: msgId
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /conversations/{id}:
    delete:
      operationId: deleteConversation
      tags: [messages]
      summary: Delete a conversation
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── GROUPS ───────────────────────────────────────────────────────────────
  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List communities/groups
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a group/community
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/{id}/join:
    post:
      operationId: joinGroup
      tags: [groups]
      summary: Join a group
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinResult"

  # ── NOTIFICATIONS ─────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: Get user notifications
      parameters:
        - in: query
          name: unread
          schema: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  # ── AI ────────────────────────────────────────────────────────────────────
  /ai/feed:
    get:
      operationId: getAiFeed
      tags: [ai]
      summary: AI-personalized content feed
      parameters:
        - in: query
          name: userId
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiFeed"

  /ai/trending-topics:
    get:
      operationId: getTrendingTopics
      tags: [ai]
      summary: AI-detected trending topics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendingTopic"

  /ai/suggestions:
    get:
      operationId: getAiSuggestions
      tags: [ai]
      summary: AI user/content suggestions
      parameters:
        - in: query
          name: userId
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSuggestions"

  /ai/moderation:
    post:
      operationId: moderateContent
      tags: [ai]
      summary: AI content moderation check
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModerationInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModerationResult"

  # ── ADMIN ─────────────────────────────────────────────────────────────────
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Admin dashboard overview stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin list all users with filters
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, suspended, all]
            default: all
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}/toggle-premium:
    patch:
      operationId: togglePremium
      tags: [admin]
      summary: Grant or revoke premium access for a user
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "404":
          description: User not found

  /admin/users/{id}/suspend:
    post:
      operationId: suspendUser
      tags: [admin]
      summary: Suspend or unsuspend a user
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuspendInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/content:
    get:
      operationId: adminListContent
      tags: [admin]
      summary: Admin list all content for moderation
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [post, reel, comment, all]
            default: all
        - in: query
          name: flagged
          schema: { type: boolean }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminContent"

  /admin/analytics:
    get:
      operationId: getAdminAnalytics
      tags: [admin]
      summary: Platform analytics over time
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 7d
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAnalytics"

  /admin/ai-system:
    get:
      operationId: getAiSystemStatus
      tags: [admin]
      summary: AI system health and self-improvement metrics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSystemStatus"

  /live/start:
    post:
      operationId: startLive
      tags: [live]
      summary: Start a live stream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LiveStreamInput"
      responses:
        "201":
          description: Live stream started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveStream"
        "409":
          description: Already live

  /live/active:
    get:
      operationId: listActiveLives
      tags: [live]
      summary: Get active live streams
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LiveStream"

  /live/{id}:
    get:
      operationId: getLive
      tags: [live]
      summary: Get a live stream by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveStream"
        "404":
          description: Not found

  /live/{id}/end:
    patch:
      operationId: endLive
      tags: [live]
      summary: End a live stream
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveStream"
        "403":
          description: Forbidden

  /live/{id}/gift:
    post:
      operationId: sendLiveGift
      tags: [live]
      summary: Send a gift during a live stream
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LiveGiftInput"
      responses:
        "200":
          description: Gift sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  newBalance: { type: integer }
        "400":
          description: Insufficient balance

  /live/{id}/gifts:
    get:
      operationId: listLiveGifts
      tags: [live]
      summary: Get gifts leaderboard for a live stream
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  gifts:
                    type: array
                    items:
                      $ref: "#/components/schemas/LiveGift"
                  totalValue: { type: integer }

  /gifts/catalog:
    get:
      operationId: listGiftCatalog
      tags: [gifts]
      summary: Get the gift catalog
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GiftCatalogItem"

  /creator/plans:
    post:
      operationId: createCreatorPlan
      tags: [creator]
      summary: Create a subscription plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatorPlanInput"
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorPlan"

  /creator/plans/{creatorId}:
    get:
      operationId: listCreatorPlans
      tags: [creator]
      summary: Get subscription plans for a creator
      parameters:
        - in: path
          name: creatorId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CreatorPlan"

  /creator/subscribe/{planId}:
    post:
      operationId: subscribeToCreator
      tags: [creator]
      summary: Subscribe to a creator plan
      parameters:
        - in: path
          name: planId
          required: true
          schema: { type: integer }
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscription:
                    $ref: "#/components/schemas/CreatorSubscription"
                  newBalance: { type: integer }
        "400":
          description: Insufficient balance
        "409":
          description: Already subscribed
    delete:
      operationId: unsubscribeFromCreator
      tags: [creator]
      summary: Cancel a creator subscription
      parameters:
        - in: path
          name: planId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Cancelled

  /creator/subscriptions:
    get:
      operationId: listMySubscriptions
      tags: [creator]
      summary: Get my active subscriptions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CreatorSubscription"

  /creator/subscribers:
    get:
      operationId: listMySubscribers
      tags: [creator]
      summary: Get my subscribers (as creator)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscribers:
                    type: array
                    items:
                      $ref: "#/components/schemas/CreatorSubscription"
                  count: { type: integer }

  /creator/check-subscription/{creatorId}:
    get:
      operationId: checkCreatorSubscription
      tags: [creator]
      summary: Check if I am subscribed to a creator
      parameters:
        - in: path
          name: creatorId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  isSubscribed: { type: boolean }

  /search:
    get:
      operationId: searchAll
      tags: [search]
      summary: Search users, posts, reels, and products
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string, enum: [all, users, posts, reels, products] }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /marketplace/categories:
    get:
      operationId: listMarketplaceCategories
      tags: [marketplace]
      summary: Get product categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceCategory"

  /marketplace/products:
    get:
      operationId: listProducts
      tags: [marketplace]
      summary: List marketplace products
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: condition
          schema: { type: string }
        - in: query
          name: minPrice
          schema: { type: integer }
        - in: query
          name: maxPrice
          schema: { type: integer }
        - in: query
          name: sellerId
          schema: { type: integer }
        - in: query
          name: sort
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  total: { type: integer }
    post:
      operationId: createProduct
      tags: [marketplace]
      summary: Create a product listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /marketplace/products/my:
    get:
      operationId: listMyProducts
      tags: [marketplace]
      summary: Get my product listings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /marketplace/products/{id}:
    get:
      operationId: getProduct
      tags: [marketplace]
      summary: Get a product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [marketplace]
      summary: Update a product listing
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [marketplace]
      summary: Delete a product listing
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK

  /marketplace/products/{id}/buy:
    post:
      operationId: buyProduct
      tags: [marketplace]
      summary: Buy a product
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyProductInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: "#/components/schemas/ProductOrder"
                  newBalance: { type: integer }

  /marketplace/products/{id}/reviews:
    get:
      operationId: listProductReviews
      tags: [marketplace]
      summary: Get product reviews
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductReview"
    post:
      operationId: createProductReview
      tags: [marketplace]
      summary: Add a product review
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductReviewInput"
      responses:
        "201":
          description: Review created

  /marketplace/orders:
    get:
      operationId: listOrders
      tags: [marketplace]
      summary: Get my orders
      parameters:
        - in: query
          name: role
          schema: { type: string, enum: [buyer, seller] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductOrder"

  /marketplace/orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [marketplace]
      summary: Update order status
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductOrder"

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields
        "500":
          description: Failed to generate upload URL

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    # ── User ────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, username, displayName, email, createdAt]
      properties:
        id: { type: integer }
        username: { type: string }
        displayName: { type: string }
        email: { type: string }
        bio: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        coverUrl: { type: ["string", "null"] }
        followersCount: { type: integer }
        followingCount: { type: integer }
        postsCount: { type: integer }
        isVerified: { type: boolean }
        isFollowing: { type: boolean }
        status: { type: string, enum: [active, suspended] }
        createdAt: { type: string }

    UserInput:
      type: object
      required: [username, displayName, email]
      properties:
        username: { type: string }
        displayName: { type: string }
        email: { type: string }
        bio: { type: string }
        avatarUrl: { type: string }

    UserUpdate:
      type: object
      properties:
        displayName: { type: string }
        bio: { type: string }
        avatarUrl: { type: string }
        coverUrl: { type: string }

    UserStatsSummary:
      type: object
      required: [totalUsers, newToday, activeToday, verifiedCount]
      properties:
        totalUsers: { type: integer }
        newToday: { type: integer }
        activeToday: { type: integer }
        verifiedCount: { type: integer }

    FollowResult:
      type: object
      required: [following, followersCount]
      properties:
        following: { type: boolean }
        followersCount: { type: integer }

    # ── Post ────────────────────────────────────────────────────────────────
    Post:
      type: object
      required: [id, author, content, type, likesCount, commentsCount, createdAt]
      properties:
        id: { type: integer }
        author:
          $ref: "#/components/schemas/User"
        content: { type: string }
        type: { type: string, enum: [photo, video, text] }
        mediaUrl: { type: ["string", "null"] }
        thumbnailUrl: { type: ["string", "null"] }
        tags: { type: array, items: { type: string } }
        likesCount: { type: integer }
        commentsCount: { type: integer }
        sharesCount: { type: integer }
        isLiked: { type: boolean }
        isFlagged: { type: boolean }
        createdAt: { type: string }

    PostInput:
      type: object
      required: [authorId, content, type]
      properties:
        authorId: { type: integer }
        content: { type: string }
        type: { type: string, enum: [photo, video, text] }
        mediaUrl: { type: string }
        tags: { type: array, items: { type: string } }

    Comment:
      type: object
      required: [id, author, content, createdAt]
      properties:
        id: { type: integer }
        author:
          $ref: "#/components/schemas/User"
        content: { type: string }
        likesCount: { type: integer }
        createdAt: { type: string }

    CommentInput:
      type: object
      required: [authorId, content]
      properties:
        authorId: { type: integer }
        content: { type: string }

    LikeResult:
      type: object
      required: [liked, likesCount]
      properties:
        liked: { type: boolean }
        likesCount: { type: integer }

    # ── Reel ────────────────────────────────────────────────────────────────
    Reel:
      type: object
      required: [id, author, videoUrl, caption, likesCount, viewsCount, createdAt]
      properties:
        id: { type: integer }
        author:
          $ref: "#/components/schemas/User"
        videoUrl: { type: string }
        thumbnailUrl: { type: ["string", "null"] }
        caption: { type: string }
        audioTrack: { type: ["string", "null"] }
        duration: { type: integer }
        likesCount: { type: integer }
        commentsCount: { type: integer }
        viewsCount: { type: integer }
        isLiked: { type: boolean }
        tags: { type: array, items: { type: string } }
        createdAt: { type: string }

    ReelInput:
      type: object
      required: [authorId, videoUrl, caption]
      properties:
        authorId: { type: integer }
        videoUrl: { type: string }
        thumbnailUrl: { type: string }
        caption: { type: string }
        audioTrack: { type: string }
        duration: { type: integer }
        tags: { type: array, items: { type: string } }

    # ── Story ────────────────────────────────────────────────────────────────
    Story:
      type: object
      required: [id, author, mediaUrl, mediaType, viewsCount, expiresAt, createdAt]
      properties:
        id: { type: integer }
        author:
          $ref: "#/components/schemas/User"
        mediaUrl: { type: string }
        mediaType: { type: string, enum: [photo, video] }
        caption: { type: ["string", "null"] }
        viewsCount: { type: integer }
        isViewed: { type: boolean }
        expiresAt: { type: string }
        createdAt: { type: string }

    StoryInput:
      type: object
      required: [authorId, mediaUrl, mediaType]
      properties:
        authorId: { type: integer }
        mediaUrl: { type: string }
        mediaType: { type: string, enum: [photo, video] }
        caption: { type: string }

    ViewResult:
      type: object
      required: [viewed, viewsCount]
      properties:
        viewed: { type: boolean }
        viewsCount: { type: integer }

    # ── Messages ─────────────────────────────────────────────────────────────
    Conversation:
      type: object
      required: [id, participants, lastMessage, unreadCount, updatedAt]
      properties:
        id: { type: integer }
        participants:
          type: array
          items:
            $ref: "#/components/schemas/User"
        lastMessage: { type: ["string", "null"] }
        unreadCount: { type: integer }
        updatedAt: { type: string }

    ConversationInput:
      type: object
      required: [participantIds]
      properties:
        participantIds:
          type: array
          items: { type: integer }

    Message:
      type: object
      required: [id, conversationId, senderId, content, createdAt]
      properties:
        id: { type: integer }
        conversationId: { type: integer }
        senderId: { type: integer }
        content: { type: string }
        mediaUrl: { type: ["string", "null"] }
        isRead: { type: boolean }
        createdAt: { type: string }

    MessageInput:
      type: object
      required: [senderId, content]
      properties:
        senderId: { type: integer }
        content: { type: string }
        mediaUrl: { type: string }

    # ── Group ─────────────────────────────────────────────────────────────────
    Group:
      type: object
      required: [id, name, description, membersCount, isPrivate, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        avatarUrl: { type: ["string", "null"] }
        coverUrl: { type: ["string", "null"] }
        membersCount: { type: integer }
        postsCount: { type: integer }
        isPrivate: { type: boolean }
        isMember: { type: boolean }
        category: { type: string }
        createdAt: { type: string }

    GroupInput:
      type: object
      required: [name, description]
      properties:
        name: { type: string }
        description: { type: string }
        avatarUrl: { type: string }
        isPrivate: { type: boolean }
        category: { type: string }

    JoinResult:
      type: object
      required: [joined, membersCount]
      properties:
        joined: { type: boolean }
        membersCount: { type: integer }

    # ── Live Gifts ────────────────────────────────────────────────────────────
    LiveGiftInput:
      type: object
      required: [giftType]
      properties:
        giftType: { type: string }

    LiveGift:
      type: object
      required: [id, liveStreamId, senderId, receiverId, giftType, giftEmoji, coinValue, createdAt]
      properties:
        id: { type: integer }
        liveStreamId: { type: integer }
        senderId: { type: integer }
        receiverId: { type: integer }
        giftType: { type: string }
        giftEmoji: { type: string }
        coinValue: { type: integer }
        createdAt: { type: string }

    GiftCatalogItem:
      type: object
      required: [type, emoji, value, label]
      properties:
        type: { type: string }
        emoji: { type: string }
        value: { type: integer }
        label: { type: string }

    # ── Creator ───────────────────────────────────────────────────────────────
    CreatorPlan:
      type: object
      required: [id, creatorId, name, price, isActive, subscriberCount, createdAt]
      properties:
        id: { type: integer }
        creatorId: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        price: { type: integer }
        perks:
          type: array
          items: { type: string }
        isActive: { type: boolean }
        subscriberCount: { type: integer }
        createdAt: { type: string }

    CreatorPlanInput:
      type: object
      required: [name, price]
      properties:
        name: { type: string }
        description: { type: string }
        price: { type: integer }
        perks:
          type: array
          items: { type: string }

    CreatorSubscription:
      type: object
      required: [id, subscriberId, creatorId, planId, status, startedAt, expiresAt]
      properties:
        id: { type: integer }
        subscriberId: { type: integer }
        creatorId: { type: integer }
        planId: { type: integer }
        status: { type: string }
        startedAt: { type: string }
        expiresAt: { type: string }
        lastPaymentAt: { type: string }
        nextPaymentAt: { type: string }

    # ── Notification ──────────────────────────────────────────────────────────
    Notification:
      type: object
      required: [id, type, message, isRead, createdAt]
      properties:
        id: { type: integer }
        type: { type: string, enum: [like, comment, follow, mention, group, system] }
        message: { type: string }
        actorName: { type: ["string", "null"] }
        actorAvatar: { type: ["string", "null"] }
        targetId: { type: ["integer", "null"] }
        targetType: { type: ["string", "null"] }
        isRead: { type: boolean }
        createdAt: { type: string }

    # ── AI ────────────────────────────────────────────────────────────────────
    AiFeed:
      type: object
      required: [posts, reels, suggestedUsers]
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        reels:
          type: array
          items:
            $ref: "#/components/schemas/Reel"
        suggestedUsers:
          type: array
          items:
            $ref: "#/components/schemas/User"

    TrendingTopic:
      type: object
      required: [tag, postCount, growth]
      properties:
        tag: { type: string }
        postCount: { type: integer }
        growth: { type: number }
        category: { type: string }

    AiSuggestions:
      type: object
      required: [users, groups, topics]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/Group"
        topics:
          type: array
          items: { type: string }

    ModerationInput:
      type: object
      required: [content]
      properties:
        content: { type: string }
        contentType: { type: string, enum: [text, image_url] }

    ModerationResult:
      type: object
      required: [safe, confidence, flags]
      properties:
        safe: { type: boolean }
        confidence: { type: number }
        flags:
          type: array
          items: { type: string }
        recommendation: { type: string }

    # ── Admin ─────────────────────────────────────────────────────────────────
    AdminDashboard:
      type: object
      required: [totalUsers, totalPosts, totalReels, totalStories, totalGroups, activeNow, flaggedContent, aiAccuracy, dailyGrowth]
      properties:
        totalUsers: { type: integer }
        totalPosts: { type: integer }
        totalReels: { type: integer }
        totalStories: { type: integer }
        totalGroups: { type: integer }
        activeNow: { type: integer }
        flaggedContent: { type: integer }
        aiAccuracy: { type: number }
        dailyGrowth: { type: number }
        topRegions:
          type: array
          items:
            type: object
            required: [region, users]
            properties:
              region: { type: string }
              users: { type: integer }

    AdminUser:
      type: object
      required: [id, username, displayName, email, status, postsCount, followersCount, createdAt]
      properties:
        id: { type: integer }
        username: { type: string }
        displayName: { type: string }
        email: { type: string }
        status: { type: string, enum: [active, suspended] }
        postsCount: { type: integer }
        followersCount: { type: integer }
        isVerified: { type: boolean }
        isAdmin: { type: boolean }
        isPremium: { type: boolean }
        lastSeen: { type: ["string", "null"] }
        createdAt: { type: string }

    SuspendInput:
      type: object
      required: [suspend]
      properties:
        suspend: { type: boolean }
        reason: { type: string }

    AdminContent:
      type: object
      required: [id, type, authorName, preview, likesCount, isFlagged, createdAt]
      properties:
        id: { type: integer }
        type: { type: string, enum: [post, reel, comment] }
        authorName: { type: string }
        authorAvatar: { type: ["string", "null"] }
        preview: { type: string }
        mediaUrl: { type: ["string", "null"] }
        likesCount: { type: integer }
        isFlagged: { type: boolean }
        flagReason: { type: ["string", "null"] }
        createdAt: { type: string }

    AdminAnalytics:
      type: object
      required: [period, userGrowth, contentGrowth, engagementRate, topContent]
      properties:
        period: { type: string }
        userGrowth:
          type: array
          items:
            type: object
            required: [date, count]
            properties:
              date: { type: string }
              count: { type: integer }
        contentGrowth:
          type: array
          items:
            type: object
            required: [date, posts, reels, stories]
            properties:
              date: { type: string }
              posts: { type: integer }
              reels: { type: integer }
              stories: { type: integer }
        engagementRate: { type: number }
        topContent:
          type: array
          items:
            $ref: "#/components/schemas/Post"

    AiSystemStatus:
      type: object
      required: [version, accuracy, modelsRunning, lastImproved, recommendations, selfImprovementEnabled]
      properties:
        version: { type: string }
        accuracy: { type: number }
        modelsRunning: { type: integer }
        lastImproved: { type: string }
        selfImprovementEnabled: { type: boolean }
        recommendations:
          type: array
          items:
            type: object
            required: [module, suggestion, impact]
            properties:
              module: { type: string }
              suggestion: { type: string }
              impact: { type: string, enum: [low, medium, high] }
        metricsHistory:
          type: array
          items:
            type: object
            required: [date, accuracy, responseTime]
            properties:
              date: { type: string }
              accuracy: { type: number }
              responseTime: { type: integer }

    LiveStreamInput:
      type: object
      required: [title]
      properties:
        title: { type: string }
        thumbnailUrl: { type: string }

    LiveStream:
      type: object
      required: [id, hostId, title, status, viewerCount, startedAt]
      properties:
        id: { type: integer }
        hostId: { type: integer }
        title: { type: string }
        thumbnailUrl: { type: ["string", "null"] }
        status: { type: string, enum: [active, ended] }
        viewerCount: { type: integer }
        startedAt: { type: string }
        endedAt: { type: ["string", "null"] }
        host:
          type: object
          properties:
            id: { type: integer }
            username: { type: string }
            displayName: { type: string }
            avatarUrl: { type: ["string", "null"] }
            isVerified: { type: boolean }

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    SearchResults:
      type: object
      properties:
        query: { type: string }
        users:
          type: array
          items: { type: object }
        posts:
          type: array
          items: { type: object }
        reels:
          type: array
          items: { type: object }
        products:
          type: array
          items: { type: object }

    MarketplaceCategory:
      type: object
      required: [id, label]
      properties:
        id: { type: string }
        label: { type: string }

    Product:
      type: object
      required: [id, sellerId, title, price, category, condition, status, stock, viewsCount, ordersCount, rating, reviewsCount, createdAt]
      properties:
        id: { type: integer }
        sellerId: { type: integer }
        title: { type: string }
        description: { type: string, nullable: true }
        price: { type: integer }
        originalPrice: { type: integer, nullable: true }
        category: { type: string }
        condition: { type: string }
        mediaUrls:
          type: array
          items: { type: string }
        thumbnailUrl: { type: string, nullable: true }
        status: { type: string }
        stock: { type: integer }
        location: { type: string, nullable: true }
        tags:
          type: array
          items: { type: string }
        viewsCount: { type: integer }
        ordersCount: { type: integer }
        rating: { type: integer }
        reviewsCount: { type: integer }
        createdAt: { type: string }
        seller:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            displayName: { type: string }
            username: { type: string }
            avatarUrl: { type: string, nullable: true }
            isVerified: { type: boolean, nullable: true }

    ProductInput:
      type: object
      required: [title, price]
      properties:
        title: { type: string }
        description: { type: string }
        price: { type: integer }
        originalPrice: { type: integer }
        category: { type: string }
        condition: { type: string }
        mediaUrls:
          type: array
          items: { type: string }
