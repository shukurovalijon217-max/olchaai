## OlchaAI — Render.com Blueprint
## Docs: https://render.com/docs/blueprint-spec

databases:
  - name: olchaai-db
    databaseName: olchaai
    user: olchaai
    plan: free

services:
  # ── 1. Express API Server ────────────────────────────────────────────────
  - type: web
    name: olchaai-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      pnpm --filter @workspace/db run push-force &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS upload_sessions (uuid TEXT PRIMARY KEY, cloudinary_url TEXT, created_at TIMESTAMPTZ DEFAULT NOW())" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS ai_admin_actions (id SERIAL PRIMARY KEY, action_type TEXT NOT NULL, target_type TEXT NOT NULL, target_id INTEGER, reason TEXT, details JSONB NOT NULL DEFAULT '{}', ai_confidence REAL NOT NULL DEFAULT 0, status TEXT NOT NULL DEFAULT 'executed', executed_at TIMESTAMPTZ NOT NULL DEFAULT NOW())" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS platform_treasury (id SERIAL PRIMARY KEY, balance NUMERIC(14,2) NOT NULL DEFAULT 0, last_updated TIMESTAMPTZ DEFAULT NOW())" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS treasury_transactions (id SERIAL PRIMARY KEY, amount NUMERIC(14,2) NOT NULL, source TEXT NOT NULL, description TEXT, created_at TIMESTAMPTZ DEFAULT NOW())" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS infra_costs (id SERIAL PRIMARY KEY, provider TEXT NOT NULL, service TEXT NOT NULL, amount_usd NUMERIC(10,4) NOT NULL, period_start TIMESTAMPTZ, period_end TIMESTAMPTZ, recorded_at TIMESTAMPTZ DEFAULT NOW())" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS infra_payments (id SERIAL PRIMARY KEY, provider TEXT NOT NULL, amount_usd NUMERIC(10,4) NOT NULL, paid_at TIMESTAMPTZ DEFAULT NOW(), note TEXT)" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS email_verifications (id SERIAL PRIMARY KEY, user_id INTEGER NOT NULL, token TEXT NOT NULL UNIQUE, expires_at TIMESTAMPTZ NOT NULL, used BOOLEAN NOT NULL DEFAULT false, created_at TIMESTAMPTZ DEFAULT NOW())" &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: WEB_CONCURRENCY
        value: 1
      - key: DATABASE_URL
        fromDatabase:
          name: olchaai-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://olchaai.com,https://www.olchaai.com
      - key: FRONTEND_URL
        value: https://olchaai.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  # ── 2. AI Core Service ───────────────────────────────────────────────────
  - type: web
    name: olchaai-ai-core
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      pnpm --filter @workspace/ai-core run build
    startCommand: node --enable-source-maps artifacts/ai-core/dist/index.mjs
    healthCheckPath: /ai-core/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: olchaai-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

  # ── 3. Go Real-Time Service ──────────────────────────────────────────────
  - type: web
    name: olchaai-go
    runtime: go
    plan: free
    region: oregon
    rootDir: artifacts/olcha-go
    buildCommand: go build -o bin/olcha-go ./cmd/server/
    startCommand: ./bin/olcha-go
    healthCheckPath: /go/health
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: olchaai-db
          property: connectionString

  # ── 4. Nexus — React Frontend ─────────────────────────────────────────────
  - type: web
    name: olchaai-nexus
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      BASE_PATH=/ pnpm --filter @workspace/nexus run build
    startCommand: npx serve -s artifacts/nexus/dist/public -l 10000
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_API_BASE_URL
        value: https://olchaai-api.onrender.com
      - key: VITE_AI_CORE_URL
        value: https://olchaai-ai-core.onrender.com
