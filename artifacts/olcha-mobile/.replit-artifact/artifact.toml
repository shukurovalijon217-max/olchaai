kind = "mobile"
previewPath = "/olcha-mobile/"
title = "OlCha Mobile"
version = "1.0.0"
id = "artifacts/olcha-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/olcha-mobile/" ]
localPort = 18348

[services.development]
run = "pnpm --filter @workspace/olcha-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/olcha-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/olcha-mobile", "run", "serve" ]

[services.env]
PORT = "18348"
BASE_PATH = "/olcha-mobile/"
