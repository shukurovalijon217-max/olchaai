name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy-nexus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build Nexus
        run: |
          cd artifacts/nexus
          PORT=3000 pnpm run build
        env:
          VITE_API_BASE_URL: ""
          VITE_WS_URL: "wss://olchaai-go-production.up.railway.app/go/ws"

      - name: Install Railway CLI
        run: npm i -g @railway/cli@latest

      - name: Deploy Nexus to Railway
        run: |
          railway up \
            --service 6a712054-0c1a-4e3d-b8e9-39082e1b0af5 \
            --environment 3f9b1d72-3c22-4d24-a00a-12346a7b4da1 \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
