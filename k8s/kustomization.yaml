apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: olcha

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets-template.yaml
  - postgres.yaml
  - api-server.yaml
  - olcha-go.yaml
  - nexus.yaml
  - ingress.yaml

# Shared labels applied to all resources
commonLabels:
  app.kubernetes.io/part-of: olcha-platform
  app.kubernetes.io/managed-by: kustomize

# Image tags — update before each release
images:
  - name: olcha/api-server
    newTag: "1.0.0"
  - name: olcha/olcha-go
    newTag: "1.0.0"
  - name: olcha/nexus
    newTag: "1.0.0"
