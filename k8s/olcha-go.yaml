apiVersion: apps/v1
kind: Deployment
metadata:
  name: olcha-go
  namespace: olcha
  labels:
    app: olcha-go
    engine: golang
spec:
  replicas: 2
  selector:
    matchLabels:
      app: olcha-go
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: olcha-go
    spec:
      containers:
        - name: olcha-go
          image: olcha/olcha-go:latest
          ports:
            - containerPort: 8082
          env:
            - name: PORT
              value: "8082"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: olcha-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /go/health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /go/health
              port: 8082
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: olcha-go
  namespace: olcha
spec:
  selector:
    app: olcha-go
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: olcha-go-hpa
  namespace: olcha
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: olcha-go
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
