## OlchaAI — Render.com Blueprint
## Docs: https://render.com/docs/blueprint-spec

databases:
  - name: olchaai-db
    databaseName: olchaai
    user: olchaai
    plan: free

services:
  # ── 1. Express API Server ────────────────────────────────────────────────
  - type: web
    name: olchaai-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: olchaai-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  # ── 2. AI Core Service ───────────────────────────────────────────────────
  - type: web
    name: olchaai-ai-core
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      pnpm --filter @workspace/ai-core run build
    startCommand: node --enable-source-maps artifacts/ai-core/dist/index.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: olchaai-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

  # ── 3. Go Real-Time Service ──────────────────────────────────────────────
  - type: web
    name: olchaai-go
    runtime: go
    plan: free
    region: oregon
    rootDir: artifacts/olcha-go
    buildCommand: go build -o bin/olcha-go ./cmd/server/
    startCommand: ./bin/olcha-go
    healthCheckPath: /go/health
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: olchaai-db
          property: connectionString

  # ── 4. Nexus — React Frontend ─────────────────────────────────────────────
  - type: web
    name: olchaai-nexus
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      BASE_PATH=/ pnpm --filter @workspace/nexus run build
    startCommand: npx serve -s artifacts/nexus/dist/public -l 10000
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_API_BASE_URL
        sync: false
