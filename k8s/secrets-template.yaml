# OlCha Kubernetes Secrets Template
# Create this file manually with real values and apply with:
#   kubectl apply -f k8s/secrets-actual.yaml
# NEVER commit the actual secrets file to git.
apiVersion: v1
kind: Secret
metadata:
  name: olcha-secrets
  namespace: olcha
type: Opaque
stringData:
  DATABASE_URL: "postgresql://USER:PASSWORD@postgres:5432/olcha"
  SESSION_SECRET: "CHANGE_ME_TO_RANDOM_64_CHAR_STRING"
  STRIPE_SECRET_KEY: "sk_live_..."
  DB_USER: "olcha"
  DB_PASSWORD: "CHANGE_ME"
