name: CI — Typecheck & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    name: Typecheck + Build Nexus
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck libs
        run: pnpm run typecheck:libs

      - name: Typecheck Nexus
        run: pnpm --filter @workspace/nexus run typecheck

      - name: Typecheck API server
        run: pnpm --filter @workspace/api-server run typecheck

      - name: Build Nexus (dist)
        run: pnpm --filter @workspace/nexus run build

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Upload Nexus dist
        uses: actions/upload-artifact@v4
        with:
          name: nexus-dist
          path: artifacts/nexus/dist/
          retention-days: 7
