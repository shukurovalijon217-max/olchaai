## OlchaAI — Render.com Blueprint (Production — 10K+ users)
## Docs: https://render.com/docs/blueprint-spec
##
## Tariflar (oylik narx):
##   DB standard:        $20/oy  — 10GB, high-availability
##   API standard x2:    $50/oy  — 2GB RAM x 2 instance, autoscale
##   AI Core starter:    $7/oy   — 512MB RAM (OpenAI I/O bound, RAM kichik yetadi)
##   Go starter:         $7/oy   — 512MB RAM (Go juda tejamkor)
##   Frontend starter:   $7/oy   — 512MB RAM (static serve)
##   Jami taxminan:     ~$91/oy
##
## Cloudflare (DNS + CDN + WAF): bepul plan yetadi 10K uchun

databases:
  - name: olchaai-db
    databaseName: olchaai
    user: olchaai
    plan: standard          # $20/oy — 10GB, backups, no cold-start
    region: oregon
    ipAllowList: []         # Cloudflare + Render internal only

services:
  # ── 1. Express API Server ────────────────────────────────────────────────
  #  standard plan: 2GB RAM, 1 CPU
  #  2 ta instance: 10K req/s ni osongina ko'taradi
  #  Cloudflare WAF + Rate Limiting API'ni botlardan himoya qiladi
  - type: web
    name: olchaai-api
    runtime: node
    plan: standard
    region: oregon
    numInstances: 2          # 2 instance — load balancing Render tomonidan avtomatik
    rootDir: .
    buildCommand: >-
      npx --yes pnpm@10.26.1 install --no-frozen-lockfile &&
      pnpm run typecheck:libs &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS upload_sessions (uuid TEXT PRIMARY KEY, cloudinary_url TEXT, created_at TIMESTAMPTZ DEFAULT NOW())" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS ai_admin_actions (id SERIAL PRIMARY KEY, action_type TEXT NOT NULL, target_type TEXT NOT NULL, target_id INTEGER, reason TEXT, details JSONB NOT NULL DEFAULT '{}', ai_confidence REAL NOT NULL DEFAULT 0, status TEXT NOT NULL DEFAULT 'executed', executed_at TIMESTAMPTZ NOT NULL DEFAULT NOW())" &&
      psql "$DATABASE_URL" -c "DROP TABLE IF EXISTS platform_treasury CASCADE; CREATE TABLE platform_treasury (id SERIAL PRIMARY KEY, total_revenue BIGINT NOT NULL DEFAULT 0, available_balance BIGINT NOT NULL DEFAULT 0, total_withdrawn BIGINT NOT NULL DEFAULT 0, premium_revenue BIGINT NOT NULL DEFAULT 0, marketplace_revenue BIGINT NOT NULL DEFAULT 0, gift_revenue BIGINT NOT NULL DEFAULT 0, other_revenue BIGINT NOT NULL DEFAULT 0, updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()); INSERT INTO platform_treasury (id) VALUES (1) ON CONFLICT DO NOTHING;" &&
      psql "$DATABASE_URL" -c "DROP TABLE IF EXISTS treasury_transactions CASCADE; CREATE TABLE treasury_transactions (id SERIAL PRIMARY KEY, type TEXT NOT NULL, amount BIGINT NOT NULL, source TEXT NOT NULL, description TEXT, reference TEXT, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW());" &&
      psql "$DATABASE_URL" -c "DROP TABLE IF EXISTS infra_costs CASCADE; CREATE TABLE infra_costs (id SERIAL PRIMARY KEY, provider TEXT NOT NULL, service_name TEXT NOT NULL, amount_cents INTEGER NOT NULL, currency TEXT NOT NULL DEFAULT 'USD', billing_cycle TEXT NOT NULL DEFAULT 'monthly', auto_pay_enabled BOOLEAN NOT NULL DEFAULT TRUE, last_paid_at TIMESTAMPTZ, next_due_at TIMESTAMPTZ, notes TEXT, created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ DEFAULT NOW());" &&
      psql "$DATABASE_URL" -c "DROP TABLE IF EXISTS infra_payments CASCADE; CREATE TABLE infra_payments (id SERIAL PRIMARY KEY, cost_id INTEGER NOT NULL, provider TEXT NOT NULL, service_name TEXT NOT NULL, amount_cents INTEGER NOT NULL, status TEXT NOT NULL DEFAULT 'paid', paid_from TEXT NOT NULL DEFAULT 'treasury', notes TEXT, paid_at TIMESTAMPTZ DEFAULT NOW());" &&
      psql "$DATABASE_URL" -c "DROP TABLE IF EXISTS email_verifications CASCADE; CREATE TABLE email_verifications (id SERIAL PRIMARY KEY, email TEXT NOT NULL, otp TEXT NOT NULL, expires_at TIMESTAMPTZ NOT NULL, verified BOOLEAN DEFAULT FALSE, created_at TIMESTAMPTZ DEFAULT NOW());" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS user_sessions (sid VARCHAR NOT NULL COLLATE \"default\", sess JSON NOT NULL, expire TIMESTAMP(6) NOT NULL, CONSTRAINT session_pkey PRIMARY KEY (sid) NOT DEFERRABLE INITIALLY IMMEDIATE); CREATE INDEX IF NOT EXISTS IDX_session_expire ON user_sessions (expire);" &&
      psql "$DATABASE_URL" -c "ALTER TABLE reels ADD COLUMN IF NOT EXISTS type TEXT NOT NULL DEFAULT 'reel';" &&
      psql "$DATABASE_URL" -c "ALTER TABLE reels ADD COLUMN IF NOT EXISTS hls_url TEXT; ALTER TABLE reels ADD COLUMN IF NOT EXISTS hls_status TEXT DEFAULT 'pending'; ALTER TABLE reels ADD COLUMN IF NOT EXISTS audio_track TEXT;" &&
      psql "$DATABASE_URL" -c "ALTER TABLE posts ADD COLUMN IF NOT EXISTS scheduled_at TIMESTAMPTZ; ALTER TABLE posts ADD COLUMN IF NOT EXISTS hot_take BOOLEAN DEFAULT FALSE; ALTER TABLE posts ADD COLUMN IF NOT EXISTS aura_score REAL; ALTER TABLE posts ADD COLUMN IF NOT EXISTS audio_trim_start REAL; ALTER TABLE posts ADD COLUMN IF NOT EXISTS audio_trim_end REAL;" &&
      psql "$DATABASE_URL" -c "ALTER TABLE chat_messages ADD COLUMN IF NOT EXISTS type TEXT NOT NULL DEFAULT 'text'; ALTER TABLE chat_messages ADD COLUMN IF NOT EXISTS media_url TEXT;" &&
      psql "$DATABASE_URL" -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS timezone TEXT; ALTER TABLE users ADD COLUMN IF NOT EXISTS country TEXT; ALTER TABLE users ADD COLUMN IF NOT EXISTS notif_prefs JSONB; ALTER TABLE users ADD COLUMN IF NOT EXISTS privacy_settings JSONB; ALTER TABLE users ADD COLUMN IF NOT EXISTS ai_usage_count INTEGER NOT NULL DEFAULT 0; ALTER TABLE users ADD COLUMN IF NOT EXISTS ai_usage_reset_at DATE NOT NULL DEFAULT CURRENT_DATE; ALTER TABLE users ADD COLUMN IF NOT EXISTS ghost_until TIMESTAMPTZ; ALTER TABLE users ADD COLUMN IF NOT EXISTS focus_shield JSONB; ALTER TABLE users ADD COLUMN IF NOT EXISTS e2e_public_key TEXT; ALTER TABLE users ADD COLUMN IF NOT EXISTS warning_count INTEGER NOT NULL DEFAULT 0; ALTER TABLE users ADD COLUMN IF NOT EXISTS is_banned BOOLEAN NOT NULL DEFAULT FALSE; ALTER TABLE users ADD COLUMN IF NOT EXISTS banned_at TIMESTAMPTZ; ALTER TABLE users ADD COLUMN IF NOT EXISTS banned_reason TEXT; ALTER TABLE users ADD COLUMN IF NOT EXISTS aura_color TEXT;" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS user_blocks (id SERIAL PRIMARY KEY, blocker_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, blocked_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), UNIQUE(blocker_id, blocked_id)); CREATE INDEX IF NOT EXISTS user_blocks_blocker_idx ON user_blocks(blocker_id); CREATE INDEX IF NOT EXISTS user_blocks_blocked_idx ON user_blocks(blocked_id);" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS post_embeddings (id SERIAL PRIMARY KEY, post_id INTEGER NOT NULL UNIQUE REFERENCES posts(id) ON DELETE CASCADE, embedding vector(1536), text_hash TEXT, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW());" ||
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS post_embeddings (id SERIAL PRIMARY KEY, post_id INTEGER NOT NULL UNIQUE REFERENCES posts(id) ON DELETE CASCADE, text_hash TEXT, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW());" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS voice_comments (id SERIAL PRIMARY KEY, post_id INTEGER NOT NULL REFERENCES posts(id) ON DELETE CASCADE, author_id INTEGER NOT NULL REFERENCES users(id), audio_url TEXT NOT NULL, duration_ms INTEGER NOT NULL DEFAULT 0, waveform_data TEXT, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()); CREATE INDEX IF NOT EXISTS voice_comments_post_idx ON voice_comments(post_id); CREATE INDEX IF NOT EXISTS voice_comments_author_idx ON voice_comments(author_id);" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS ai_twin_config (id SERIAL PRIMARY KEY, user_id INTEGER NOT NULL UNIQUE REFERENCES users(id) ON DELETE CASCADE, is_enabled BOOLEAN NOT NULL DEFAULT FALSE, personality TEXT, topics TEXT, bio TEXT, total_chats INTEGER NOT NULL DEFAULT 0, last_active_at TIMESTAMPTZ, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()); CREATE TABLE IF NOT EXISTS ai_twin_chats (id SERIAL PRIMARY KEY, twin_owner_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, visitor_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()); CREATE TABLE IF NOT EXISTS ai_twin_messages (id SERIAL PRIMARY KEY, chat_id INTEGER NOT NULL REFERENCES ai_twin_chats(id) ON DELETE CASCADE, role TEXT NOT NULL, content TEXT NOT NULL, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW());" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS scenarios (id SERIAL PRIMARY KEY, creator_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, title TEXT NOT NULL, description TEXT, thumbnail TEXT, is_published BOOLEAN NOT NULL DEFAULT FALSE, view_count INTEGER NOT NULL DEFAULT 0, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()); CREATE TABLE IF NOT EXISTS scenario_branches (id SERIAL PRIMARY KEY, scenario_id INTEGER NOT NULL REFERENCES scenarios(id) ON DELETE CASCADE, parent_id INTEGER, video_url TEXT, choice_text TEXT NOT NULL, choice_emoji TEXT NOT NULL DEFAULT '👉', is_root BOOLEAN NOT NULL DEFAULT FALSE, order_index INTEGER NOT NULL DEFAULT 0, view_count INTEGER NOT NULL DEFAULT 0, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW());" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS content_analysis (id SERIAL PRIMARY KEY, content_id INTEGER NOT NULL, content_type TEXT NOT NULL, tags TEXT[], category TEXT, summary TEXT, sentiment TEXT, ai_metadata TEXT, analyzed_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), UNIQUE(content_type, content_id));" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS grow_together_goals (id SERIAL PRIMARY KEY, user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, title TEXT NOT NULL, description TEXT, target_date TIMESTAMPTZ, progress INTEGER NOT NULL DEFAULT 0, status TEXT NOT NULL DEFAULT 'active', partner_id INTEGER REFERENCES users(id), created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()); CREATE TABLE IF NOT EXISTS grow_together_check_ins (id SERIAL PRIMARY KEY, goal_id INTEGER NOT NULL REFERENCES grow_together_goals(id) ON DELETE CASCADE, user_id INTEGER NOT NULL REFERENCES users(id), note TEXT, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW());" &&
      psql "$DATABASE_URL" -c "ALTER TABLE posts ADD COLUMN IF NOT EXISTS midnight_only BOOLEAN NOT NULL DEFAULT FALSE; ALTER TABLE posts ADD COLUMN IF NOT EXISTS destruct_at TIMESTAMPTZ; ALTER TABLE posts ADD COLUMN IF NOT EXISTS emotion_score REAL; ALTER TABLE posts ADD COLUMN IF NOT EXISTS echo_score REAL; ALTER TABLE posts ADD COLUMN IF NOT EXISTS shares_count INTEGER NOT NULL DEFAULT 0; ALTER TABLE posts ADD COLUMN IF NOT EXISTS is_time_capsule BOOLEAN NOT NULL DEFAULT FALSE; ALTER TABLE posts ADD COLUMN IF NOT EXISTS capsule_open_at TIMESTAMPTZ;" &&
      psql "$DATABASE_URL" -c "ALTER TABLE reels ADD COLUMN IF NOT EXISTS shares_count INTEGER NOT NULL DEFAULT 0; ALTER TABLE reels ADD COLUMN IF NOT EXISTS otube_category TEXT; ALTER TABLE reels ADD COLUMN IF NOT EXISTS is_collab BOOLEAN NOT NULL DEFAULT FALSE;" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS challenges (id SERIAL PRIMARY KEY, creator_id INTEGER NOT NULL REFERENCES users(id), name TEXT NOT NULL, hashtag TEXT NOT NULL, category TEXT NOT NULL, description TEXT, days INTEGER NOT NULL DEFAULT 7, prize_pool INTEGER NOT NULL DEFAULT 0, judge_type TEXT NOT NULL DEFAULT 'vote', status TEXT NOT NULL DEFAULT 'active', settings JSONB NOT NULL DEFAULT '{}', starts_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), ends_at TIMESTAMPTZ, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()); CREATE TABLE IF NOT EXISTS challenge_participants (id SERIAL PRIMARY KEY, challenge_id INTEGER NOT NULL REFERENCES challenges(id) ON DELETE CASCADE, user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, reel_id INTEGER REFERENCES reels(id), joined_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), UNIQUE(challenge_id, user_id));" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS post_votes (id SERIAL PRIMARY KEY, post_id INTEGER NOT NULL REFERENCES posts(id) ON DELETE CASCADE, user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, option_index INTEGER NOT NULL, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), UNIQUE(post_id, user_id)); CREATE TABLE IF NOT EXISTS hot_take_votes (id SERIAL PRIMARY KEY, post_id INTEGER NOT NULL REFERENCES posts(id) ON DELETE CASCADE, user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, vote TEXT NOT NULL, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), UNIQUE(post_id, user_id));" &&
      psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS premium_config (id INTEGER PRIMARY KEY DEFAULT 1, monthly_price_cents INTEGER NOT NULL DEFAULT 999, annual_price_cents INTEGER NOT NULL DEFAULT 9999, stripe_monthly_price_id TEXT, stripe_annual_price_id TEXT, features JSONB NOT NULL DEFAULT '{}', updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()); INSERT INTO premium_config (id) VALUES (1) ON CONFLICT DO NOTHING;" &&
      psql "$DATABASE_URL" -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS stripe_customer_id TEXT; ALTER TABLE users ADD COLUMN IF NOT EXISTS stripe_subscription_id TEXT; ALTER TABLE users ADD COLUMN IF NOT EXISTS is_premium BOOLEAN NOT NULL DEFAULT FALSE; ALTER TABLE users ADD COLUMN IF NOT EXISTS is_admin BOOLEAN NOT NULL DEFAULT FALSE; ALTER TABLE users ADD COLUMN IF NOT EXISTS is_verified BOOLEAN NOT NULL DEFAULT FALSE;" &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: WEB_CONCURRENCY
        value: 2             # standard plan: 1 CPU → 2 Node.js worker cluster
      - key: DATABASE_URL
        fromDatabase:
          name: olchaai-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://olchaai.com,https://www.olchaai.com
      - key: FRONTEND_URL
        value: https://olchaai.com
      - key: API_BASE_URL
        value: https://olchaai-api.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: INTERNAL_SERVICE_SECRET
        sync: false
      - key: COTURN_DOMAIN
        value: turn.olchaai.com
      - key: COTURN_SECRET
        sync: false
      - key: MEILI_HOST
        sync: false
      - key: MEILI_MASTER_KEY
        sync: false
      - key: READ_REPLICA_DATABASE_URL
        sync: false

  # ── 2. AI Core Service ───────────────────────────────────────────────────
  #  starter plan yetadi: AI Core asosan OpenAI'ga so'rov yuboradi (I/O bound)
  #  RAM intensiv operatsiyalar yo'q
  - type: web
    name: olchaai-ai-core
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: >-
      npx --yes pnpm@10.26.1 install --no-frozen-lockfile &&
      pnpm run typecheck:libs &&
      pnpm --filter @workspace/ai-core run build
    startCommand: node --enable-source-maps artifacts/ai-core/dist/index.mjs
    healthCheckPath: /ai-core/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: olchaai-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # ── 3. Go Real-Time Service ──────────────────────────────────────────────
  #  starter plan yetadi: Go goroutine-based, 512MB RAM bilan 50K+ WebSocket
  #  connectionni osongina ko'taradi
  - type: web
    name: olchaai-go
    runtime: go
    plan: starter
    region: oregon
    rootDir: artifacts/olcha-go
    buildCommand: go build -o bin/olcha-go ./cmd/server/
    startCommand: ./bin/olcha-go
    healthCheckPath: /go/health
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: olchaai-db
          property: connectionString

  # ── 4. Nexus — React Frontend (Static) ───────────────────────────────────
  #  starter plan yetadi: statik fayllar serve qiladi
  #  Cloudflare CDN keshlab oladi → Render serverga deyarli traffic tushmaydi
  - type: web
    name: olchaai-nexus
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: npx --yes pnpm@10.26.1 install --no-frozen-lockfile
    startCommand: node artifacts/nexus/server.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_API_BASE_URL
        value: https://olchaai-api.onrender.com
      - key: VITE_AI_CORE_URL
        value: https://olchaai-ai-core.onrender.com/ai-core
      - key: VITE_WS_URL
        value: wss://olchaai-go.onrender.com/go/ws
